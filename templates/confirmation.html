<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking Confirmed - SkyNova</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;700;800;900&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="page-scroll">
    <div class="page-bg"></div>
    {% set active = 'mybookings' %}
    {% include 'partials/navbar.html' %}

    <div class="page-content">
        <div class="container" style="max-width:850px;padding-top:20px">
            <div id="confirmationContent" style="animation:slideUp 0.4s var(--ease) both">
                <div class="text-center py-5"><div class="spinner-border" style="color:var(--accent)"></div><p class="mt-3" style="color:var(--text-tertiary)">Loading your booking...</p></div>
            </div>
        </div>
        <footer class="landing-footer mt-5">&copy; 2024 SkyNova Airlines Inc.</footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => loadConfirmation({{ booking_id }}));
        window.addEventListener('scroll',()=>{document.getElementById('landingNav').classList.toggle('scrolled',window.scrollY>60)});
    </script>
</body>
</html>
