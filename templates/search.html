<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Flights - SkyNova</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;700;800;900&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="page-scroll">
    <div class="page-bg"></div>
    {% set active = 'search' %}
    {% include 'partials/navbar.html' %}

    <div class="page-content">
        <!-- Hero -->
        <div class="page-hero">
            <div class="page-hero-glow"></div>
            <div class="section-tag" style="animation:slideUp 0.4s var(--ease) both">EXPLORE</div>
            <h1 class="section-title" style="font-size:2.6rem;animation:slideUp 0.4s var(--ease) both;animation-delay:0.05s">Find your perfect flight</h1>
            <p style="color:var(--text-tertiary);max-width:450px;margin:0 auto 32px;animation:slideUp 0.4s var(--ease) both;animation-delay:0.1s">Compare prices across airlines. Book in seconds.</p>
        </div>

        <!-- Search Bar -->
        <div class="container" style="max-width:960px">
            <div class="glass-card mb-4 p-3" style="animation:slideUp 0.4s var(--ease) both;animation-delay:0.15s">
                <form id="searchForm" onsubmit="fetchFlights(event)">
                    <div class="row g-2 align-items-end">
                        <div class="col-md-3">
                            <label class="form-label-dark">FROM</label>
                            <input type="text" list="airportList" class="form-control form-control-dark" id="departureCity" required placeholder="City or airport">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label-dark">TO</label>
                            <input type="text" list="airportList" class="form-control form-control-dark" id="arrivalCity" required placeholder="City or airport">
                        </div>
                        <datalist id="airportList">{% for city in airports %}<option value="{{ city }}">{% endfor %}</datalist>
                        <div class="col-md-2">
                            <label class="form-label-dark">DATE</label>
                            <input type="date" class="form-control form-control-dark" id="departureDate" required>
                        </div>
                        <div class="col">
                            <label class="form-label-dark">PAX</label>
                            <select class="form-select-dark" id="passengerCount">
                                <option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="4">4</option><option value="5">5</option>
                            </select>
                        </div>

                        <div class="col-md-2">
                            <button type="submit" class="btn btn-accent w-100" style="padding:12px"><i class="fas fa-search me-2"></i>Search</button>
                        </div>
                    </div>
                </form>
            </div>

            <!-- Results -->
            <div id="flight-results">
                <div class="text-center" style="margin-top:60px;animation:fadeIn 0.6s ease both">
                    <div style="width:64px;height:64px;border-radius:16px;background:var(--accent-soft);margin:0 auto 16px;display:flex;align-items:center;justify-content:center">
                        <i class="fas fa-plane-departure" style="font-size:24px;color:var(--accent);opacity:0.6"></i>
                    </div>
                    <h5 class="fw-bold mb-1" style="font-size:16px">Search for flights</h5>
                    <p style="font-size:13px;color:var(--text-tertiary);max-width:300px;margin:0 auto">Enter your travel details above to compare prices across all airlines</p>
                </div>
            </div>
        </div>

        <footer class="landing-footer mt-5">&copy; 2024 SkyNova Airlines Inc.</footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
    <script>window.addEventListener('scroll',()=>{document.getElementById('landingNav').classList.toggle('scrolled',window.scrollY>60)})</script>
</body>
</html>
