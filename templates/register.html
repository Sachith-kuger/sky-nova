<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Passenger - SkyNova</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;700;800;900&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="page-scroll">
    <div class="page-bg"></div>
    {% set active = '' %}
    {% include 'partials/navbar.html' %}

    <div class="page-content">
        <div class="page-hero" style="padding-bottom:10px">
            <div class="page-hero-glow"></div>
            <div class="section-tag" style="animation:slideUp 0.4s var(--ease) both">REGISTER</div>
            <h1 class="section-title" style="font-size:2.4rem;animation:slideUp 0.4s var(--ease) both;animation-delay:0.05s">Add Passenger</h1>
        </div>
        <div class="container" style="max-width:600px">
            <div class="glass-card" style="animation:slideUp 0.4s var(--ease) both;animation-delay:0.1s">
                <form id="registerForm" onsubmit="registerPassenger(event)">
                    <div class="row g-3">
                        <div class="col-md-6"><label class="form-label-dark">FIRST NAME</label><input type="text" class="form-control form-control-dark" id="firstName" required placeholder="John"></div>
                        <div class="col-md-6"><label class="form-label-dark">LAST NAME</label><input type="text" class="form-control form-control-dark" id="lastName" required placeholder="Doe"></div>
                        <div class="col-12"><label class="form-label-dark">EMAIL</label><input type="email" class="form-control form-control-dark" id="email" required placeholder="you@example.com"></div>
                        <div class="col-12"><button type="submit" class="btn btn-accent w-100 py-2 mt-2">Register <i class="fas fa-check ms-2"></i></button></div>
                    </div>
                </form>
            </div>
        </div>
        <footer class="landing-footer mt-5">&copy; 2024 SkyNova Airlines Inc.</footer>
    </div>
    <div id="toast-container" class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index:1055"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
    <script>window.addEventListener('scroll',()=>{document.getElementById('landingNav').classList.toggle('scrolled',window.scrollY>60)})</script>
</body>
</html>
