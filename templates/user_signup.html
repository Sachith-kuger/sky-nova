<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - SkyNova</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="page-bg"></div>
    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="text-center mb-4">
                <a href="{{ url_for('home') }}" class="text-decoration-none d-inline-flex align-items-center gap-2 mb-3">
                    <div class="sidebar-logo"><svg viewBox="0 0 48 48" fill="none"><path d="M42 20L26 14L18 4L16 6L20 14L8 12L4 7L2 8L5 16L2 18L5 26L2 27L4 28L8 23L20 21L16 29L18 31L26 21L42 15C44 14.3 44 20.7 42 20Z" fill="white"/><path d="M6 32C12 30 20 31 28 28" stroke="#d50032" stroke-width="2" stroke-linecap="round" opacity="0.8"/></svg></div>
                    <span style="font-family:'Outfit';font-weight:800;font-size:20px;color:var(--text);letter-spacing:-0.03em">SkyNova</span>
                </a>
                <h5 class="fw-bold mb-1">Create your account</h5>
                <p style="font-size:13px;color:var(--text-tertiary)">Join millions of happy travelers</p>
            </div>
            {% if error %}
            <div class="alert border-0 py-2 mb-3" style="border-radius:8px;font-size:12px;background:rgba(239,68,68,0.06);color:#dc2626"><i class="fas fa-exclamation-circle me-2"></i>{{ error }}</div>
            {% endif %}
            <form method="POST">
                <div class="row g-3 mb-3">
                    <div class="col-6"><label class="form-label">FIRST NAME</label><input type="text" class="form-control form-control-custom" name="firstName" required placeholder="John"></div>
                    <div class="col-6"><label class="form-label">LAST NAME</label><input type="text" class="form-control form-control-custom" name="lastName" required placeholder="Doe"></div>
                </div>
                <div class="mb-3"><label class="form-label">EMAIL</label><input type="email" class="form-control form-control-custom" name="email" required placeholder="you@example.com"></div>
                <div class="mb-3"><label class="form-label">PHONE <span style="opacity:0.4">(optional)</span></label><input type="tel" class="form-control form-control-custom" name="phone" placeholder="+91 9876543210"></div>
                <div class="mb-4"><label class="form-label">PASSWORD</label><div class="position-relative"><input type="password" class="form-control form-control-custom" name="password" id="signupPassword" required placeholder="Min 6 characters" minlength="6" style="padding-right:44px"><i class="fas fa-eye-slash pwd-toggle" onclick="togglePwd('signupPassword', this)" title="Show password"></i></div></div>
                <button type="submit" class="btn btn-accent w-100 py-3 fw-bold" style="font-size:14px">Create Account <i class="fas fa-arrow-right ms-2"></i></button>
            </form>
            <div class="text-center mt-4">
                <span style="font-size:12.5px;color:var(--text-tertiary)">Already have an account?</span>
                <a href="{{ url_for('user_login') }}" class="fw-bold text-decoration-none" style="color:var(--accent);font-size:12.5px"> Sign in</a>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
    <script>
    function togglePwd(id, icon) {
        const input = document.getElementById(id);
        if (input.type === 'password') { input.type = 'text'; icon.classList.replace('fa-eye-slash','fa-eye'); }
        else { input.type = 'password'; icon.classList.replace('fa-eye','fa-eye-slash'); }
    }
    </script>
</body>
</html>
